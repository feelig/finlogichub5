name: Daily Source Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "23 14 * * *"

jobs:
  source-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run release checks
        run: npm run release

      - name: Publish source-scan summary
        if: always()
        run: |
          if [ -f reports/daily-source-scan.md ]; then
            cat reports/daily-source-scan.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload source-scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-source-scan
          path: reports/daily-source-scan.*
